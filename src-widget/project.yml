name: CCSpaceWidget
options:
  bundleIdPrefix: com.ccspace.desktop
  deploymentTarget:
    macOS: "26.0"

targets:
  CCSpaceWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ccspace.desktop.widget
        PRODUCT_NAME: CCSpaceWidgetExtension
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: CCSpaceWidgetExtension.entitlements
        MARKETING_VERSION: "2.2.0"
        CURRENT_PROJECT_VERSION: 4
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
