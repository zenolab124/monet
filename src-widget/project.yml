name: MonetWidget
options:
  bundleIdPrefix: io.github.zenolab124.monet
  deploymentTarget:
    macOS: "26.0"

targets:
  MonetWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.zenolab124.monet.widget
        PRODUCT_NAME: MonetWidgetExtension
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: MonetWidgetExtension.entitlements
        MARKETING_VERSION: "2.2.0"
        CURRENT_PROJECT_VERSION: 4
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
