[package]
name = "app"
version = "0.1.0"
description = "A Tauri App"
authors = ["you"]
license = ""
repository = ""
edition = "2021"
rust-version = "1.77.2"
default-run = "app"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

# 独立的 stdio MCP server 二进制，被 claude CLI 通过 --mcp-config 拉起
[[bin]]
name = "cc-space-mcp"
path = "src/bin/cc_space_mcp.rs"

# Claude Code 数据格式差距探测器（dev 工具），读 schema-support.json 声明做三态 diff
[[bin]]
name = "schema-probe"
path = "src/bin/schema_probe.rs"

[build-dependencies]
tauri-build = { version = "2.5.6", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
dirs = "6"
log = "0.4"
regex = "1"
notify = { version = "8", default-features = false, features = ["macos_fsevent"] }
rayon = "1.10"
tauri = { version = "2.10.3", features = ["macos-private-api", "tray-icon", "image-png"] }
tauri-plugin-log = "2"
tauri-plugin-shell = "2"
