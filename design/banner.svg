      <stop offset="0%" stop-color="#E8663F" stop-opacity=".30"/>
      <stop offset="55%" stop-color="#E8663F" stop-opacity=".14"/>
      <stop offset="100%" stop-color="#E8663F" stop-opacity="0"/>
