  <text x="526" y="240" font-family="ui-sans-serif, -apple-system, 'SF Pro Text', 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="30" font-weight="500" letter-spacing=".5" fill="#93A7B4">Mission Control for Claude Code</text>
