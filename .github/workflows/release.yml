name: Release

# 推 v* tag 触发:完整复刻本地发版产物(app + Tray helper + Widget + 稳定身份签名
# + DMG + updater 三件套),发 draft release——人工检查后 publish 才对 updater 生效。
#
# 所需 secrets:
#   SIGNING_CERT_P12          自签证书 "Monet Signing" 导出的 .p12,base64 编码
#   SIGNING_CERT_PASSWORD     .p12 导出密码
#   TAURI_SIGNING_PRIVATE_KEY updater minisign 私钥(对应 tauri.conf 的 pubkey)
#
# 签名用与本地相同的稳定自签身份:updater 静默升级后签名不变,TCC 授权不丢。
# 公证(Developer ID)按触发式策略暂缓,届时仅需替换证书 secrets 与 SIGN_ID。

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Import signing certificate
        env:
          CERT_P12: ${{ secrets.SIGNING_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASS="ci-$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASS" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASS" build.keychain
          security set-keychain-settings -lut 3600 build.keychain
          echo "$CERT_P12" | base64 -d > /tmp/cert.p12
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S 'apple-tool:,apple:,codesign:' -s -k "$KEYCHAIN_PASS" build.keychain
          # 自签证书必须进系统信任链,否则 codesign 拒绝用它签名。
          # PEM 从已导入的 keychain 用 security 原生导出——security export 产的 p12
          # 是 RC2-40 老式加密,OpenSSL 3 默认拒解(首跑实败教训),绕开 openssl
          security find-certificate -c "Monet Signing" -p build.keychain > /tmp/cert.pem
          sudo security add-trusted-cert -d -r trustRoot -p codeSign -k /Library/Keychains/System.keychain /tmp/cert.pem
          rm -f /tmp/cert.p12 /tmp/cert.pem

      - name: Install dependencies
        run: pnpm install

      - name: Build app
        run: pnpm tauri build --bundles app

      - name: Bundle tray helper
        run: bash scripts/bundle-tray.sh

      - name: Build widget, sign, package
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
          SIGN_ID: Monet Signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: src-widget/build.sh

      - name: Verify signature
        run: |
          codesign --verify --deep --strict src-tauri/target/release/bundle/macos/Monet.app
          codesign -dv src-tauri/target/release/bundle/macos/Monet.app 2>&1 | grep 'Authority\|Signature'

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --title "Monet ${GITHUB_REF_NAME}" \
            --generate-notes \
            src-tauri/target/release/bundle/dmg/*.dmg \
            src-tauri/target/release/bundle/updater/*.app.tar.gz \
            src-tauri/target/release/bundle/updater/*.sig \
            src-tauri/target/release/bundle/updater/latest.json
