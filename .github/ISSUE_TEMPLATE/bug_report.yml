name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: input
    id: monet-version
    attributes:
      label: Monet version
      placeholder: e.g. 0.1.23 (About panel or Settings)
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: e.g. macOS 15.5 (Apple Silicon)
    validations:
      required: true
  - type: input
    id: cli-version
    attributes:
      label: Claude Code CLI version
      placeholder: output of `claude --version`
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Attach screenshots or relevant console output if available.
    validations:
      required: false
